<div class="container mt-4">
  <h2>{{ isEdit ? 'Editar Producto' : 'Nuevo Producto' }}</h2>

  <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input formControlName="name" class="form-control" />
    </div>

  <div class="mb-3">
    <label class="form-label">Categoría</label>
      <select formControlName="category" class="form-select">
        <option [ngValue]="null" disabled>Seleccione una categoría</option>
        <option *ngFor="let cat of categories" [ngValue]="cat">{{ cat.name }}</option>
      </select>
  </div>

    <div class="mb-3">
      <label class="form-label">Código</label>
      <input formControlName="code" class="form-control" />
    </div>

    <div class="mb-3">
      <label class="form-label">Precio</label>
      <input formControlName="price" type="number" class="form-control" />
    </div>

    <div class="mb-3">
      <label class="form-label">Stock</label>
      <input formControlName="stock" type="number" class="form-control" />
    </div>

    <button type="submit" class="btn btn-primary">
      {{ isEdit ? 'Actualizar' : 'Guardar' }}
    </button>
    <a [routerLink]="['/productos']" class="btn btn-secondary ms-2">Cancelar</a>
  </form>
</div>
