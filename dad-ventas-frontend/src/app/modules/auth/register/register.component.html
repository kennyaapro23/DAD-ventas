<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
    <h2 class="text-center mb-4">Registrarse</h2>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="mb-3">
        <label for="userName" class="form-label">Usuario</label>
        <input
          type="text"
          id="userName"
          class="form-control"
          formControlName="userName"
          [ngClass]="{ 'is-invalid': submitted && registerForm.get('userName')?.invalid }"
          placeholder="Tu usuario"
        />
        <div class="invalid-feedback">El usuario es obligatorio.</div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input
          type="password"
          id="password"
          class="form-control"
          formControlName="password"
          [ngClass]="{ 'is-invalid': submitted && registerForm.get('password')?.invalid }"
          placeholder="********"
        />
        <div class="invalid-feedback">La contraseña es obligatoria.</div>
      </div>

      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
        <input
          type="password"
          id="confirmPassword"
          class="form-control"
          formControlName="confirmPassword"
          [ngClass]="{ 'is-invalid': submitted && registerForm.get('confirmPassword')?.invalid }"
          placeholder="********"
        />
        <div class="invalid-feedback">Debes confirmar tu contraseña.</div>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger py-2">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary w-100">Registrarse</button>
    </form>

    <div class="text-center mt-3">
      <span>¿Ya tienes cuenta?</span>
      <a routerLink="/auth/login" class="btn btn-link px-0">Iniciar sesión</a>
    </div>
  </div>
</div>
