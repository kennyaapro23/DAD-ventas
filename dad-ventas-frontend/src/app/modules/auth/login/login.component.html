<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
    <h2 class="text-center mb-4">Iniciar Sesión</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="mb-3">
        <label for="userName" class="form-label">Usuario</label>
        <input
          type="text"
          id="userName"
          class="form-control"
          [ngClass]="{'is-invalid': submitted && loginForm.controls['userName'].invalid}"
          formControlName="userName"
          placeholder="Tu usuario"
        />
        <div class="invalid-feedback">El usuario es obligatorio.</div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input
          type="password"
          id="password"
          class="form-control"
          [ngClass]="{'is-invalid': submitted && loginForm.controls['password'].invalid}"
          formControlName="password"
          placeholder="********"
        />
        <div class="invalid-feedback">La contraseña es obligatoria.</div>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger py-2">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>

    <!-- Botón de registro -->
    <div class="text-center mt-3">
      <span>¿No tienes cuenta?</span>
      
      <a routerLink="/auth/register" class="btn btn-link px-0">Registrarse</a>

    </div>
  </div>
</div>
