<div class="flex h-screen overflow-hidden bg-slate-50 text-slate-800 font-sans">
    <!-- SIDEBAR -->
    <aside
            class="fixed lg:static inset-y-0 left-0 z-30 w-64 transform transition-transform duration-300 ease-in-out bg-gradient-to-b from-white to-slate-100 border-r border-slate-200 shadow-xl"

    >
        <div class="flex flex-col h-full px-6 py-8 space-y-6">

            <!-- LOGO -->
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-lg bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-lg shadow-sm">
                    🛍
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-800">Admin</h1>
            </div>

            <!-- NAVIGATION -->
            <nav class="flex flex-col space-y-2 text-[15px] font-semibold text-slate-700">
                <ng-container *ngFor="let item of sidebarItems">
                    <a
                            [routerLink]="item.route"
                            routerLinkActive="active"
                            class="flex items-center gap-3 px-4 py-3.5 rounded-lg transition-all no-underline shadow-sm group hover:shadow-md hover:-translate-y-0.5 hover:bg-indigo-50 hover:text-indigo-700"
                    >
                        <i class="{{ item.icon }} text-indigo-400 group-hover:text-indigo-600 text-lg transition-all"></i>
                        <span class="flex-1 transition-all">{{ item.label }}</span>
                        <span
                                *ngIf="item.badge"
                                class="ml-auto text-xs bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full font-medium"
                        >
            {{ item.badge }}
          </span>
                    </a>
                </ng-container>
            </nav>

            <!-- LOGOUT -->
            <div class="border-t border-slate-200 pt-6 mt-auto">
                <button
                        (click)="logout()"
                        class="flex items-center gap-3 px-4 py-3.5 w-full text-left rounded-lg text-red-600 hover:bg-red-50 hover:shadow transition-all font-semibold group"
                >
                    <i class="fa-solid fa-arrow-right-from-bracket text-red-400 group-hover:text-red-600 text-lg transition-all"></i>
                    Cerrar sesión
                </button>
            </div>
        </div>
    </aside>



    <!-- MAIN -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- HEADER -->
        <header
                class="sticky top-0 z-10 flex justify-between items-center h-16 px-6 bg-white border-b border-slate-200 shadow-sm backdrop-blur-sm bg-opacity-90"
        >
            <div class="text-lg font-bold">Panel de Control</div>
            <div class="flex items-center gap-4">
                <button class="relative" (click)="toggleCart()">
                    🛒
                    <span
                            *ngIf="cartTotalCount > 0"
                            class="absolute -top-2 -right-2 rounded-full bg-red-500 text-white text-xs px-2"
                    >
            {{ cartTotalCount }}
          </span>
                </button>
                <div class="flex items-center gap-2">
                    <img
                            src="https://i.pravatar.cc/100?img=12"
                            class="w-8 h-8 rounded-full shadow"
                    />
                    <span class="font-medium">John Doe</span>
                </div>
            </div>
        </header>

        <!-- CONTENIDO -->
        <main class="flex-1 overflow-y-auto p-7">
            <router-outlet></router-outlet>
        </main>
    </div>

    <!-- CARRITO -->
    <div
            *ngIf="cartOpen"
            class="fixed right-0 top-0 h-full w-80 bg-white border-l border-slate-200 shadow-xl z-50 overflow-y-auto"
    >
        <div class="flex justify-between items-center p-4 border-b">
            <h2 class="font-semibold text-lg">Carrito</h2>
            <button (click)="toggleCart()">✖</button>
        </div>
        <div *ngIf="cartItems.length === 0" class="p-4 text-slate-500">
            El carrito está vacío.
        </div>
        <div
                *ngFor="let item of cartItems; let i = index"
                class="flex justify-between items-center p-4 border-b"
        >
            <span>{{ item.name }}</span>
            <span class="text-sm text-slate-600">${{ item.price }}</span>
            <button (click)="removeFromCart(i)" class="text-red-500 hover:text-red-700">
                🗑
            </button>
        </div>
        <div class="p-4 font-medium">
            Total:
            <span class="float-right">${{ cartTotal.toFixed(2) }}</span>
        </div>
        <div class="p-4">
            <button
                    (click)="checkout()"
                    class="w-full bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition"
            >
                Finalizar Compra
            </button>
        </div>
    </div>
</div>
